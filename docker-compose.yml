services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_PATH: /app/data/db.sqlite
      UPLOAD_DIR: /app/data/uploads
      BACKUP_DIR: /app/backups
    volumes:
      - bsp_data:/app/data
      - bsp_backups:/app/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  bsp_data:
    driver: local
  bsp_backups:
    driver: local
